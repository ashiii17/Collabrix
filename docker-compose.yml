services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: collabrix
      POSTGRES_PASSWORD: collabrix
      POSTGRES_DB: collabrix
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres-data:
